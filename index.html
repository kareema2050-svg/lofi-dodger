<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lofi Dodger</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #14112a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ── constants (mirrored from Java) ───────────────────────────
const W = 420, H = 600;
const GRAVITY  = 0.42;
const FLAP     = -8.0;
const COL_W    = 54;
const GAP      = 145;
const COL_INT  = 110;
const BIRD_R   = 18;
const BIRD_X   = 90;
const SC       = 55;

// colours
const BG_TOP   = '#14112a';
const BG_BOT   = '#2d2550';
const LAVENDER = 'rgb(164,143,200)';
const PINK     = 'rgb(232,154,176)';
const AMBER    = 'rgb(240,192,112)';
const CREAM    = 'rgb(245,230,200)';
const COL_DARK = 'rgb(74,58,106)';
const COL_MID  = 'rgb(122,106,154)';
const COL_RIM  = 'rgb(164,143,200)';

// ── canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('c');
canvas.width  = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

// ── state ────────────────────────────────────────────────────
let state = 'IDLE'; // IDLE | PLAYING | DEAD
let score = 0, best = 0;
let colSpeed = 2.4;
let colTimer = 0;
let tick = 0;

let birdY = H / 2, birdVY = 0;
let wingAngle = 0, wingDir = 1, bobPhase = 0;

let cols  = []; // {x, top, bottom, scored}
let parts = []; // {x,y,vx,vy,r,life,cr,cg,cb}

// ── stars ────────────────────────────────────────────────────
const sx = [], sy = [], sr = [], sph = [], sspd = [];
for (let i = 0; i < SC; i++) {
  sx.push(Math.random() * W);
  sy.push(Math.random() * H);
  sr.push(Math.random() * 1.4 + 0.4);
  sph.push(Math.random() * Math.PI * 2);
  sspd.push(Math.random() * 0.04 + 0.015);
}

// ── controls ─────────────────────────────────────────────────
function flap() {
  if (state === 'DEAD' || state === 'IDLE') { startGame(); return; }
  birdVY = FLAP;
}

function startGame() {
  score = 0; colTimer = 0; colSpeed = 2.4;
  birdY = H / 2; birdVY = 0;
  cols = []; parts = [];
  state = 'PLAYING';
}

function die() {
  state = 'DEAD';
  burst(BIRD_X, birdY);
  if (score > best) best = score;
}

function spawnCol() {
  const gc = 120 + Math.floor(Math.random() * (H - 240));
  cols.push({ x: W + COL_W, top: gc - GAP/2, bottom: gc + GAP/2, scored: false });
}

function burst(x, y) {
  const pal = [[232,154,176],[164,143,200],[126,200,176],[240,192,112]];
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 4 + 1;
    const c = pal[Math.floor(Math.random() * pal.length)];
    parts.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 2,
      r: Math.random() * 4 + 2,
      life: 1,
      cr: c[0], cg: c[1], cb: c[2]
    });
  }
}

function hits(col) {
  const br = BIRD_R - 3;
  if (BIRD_X + br < col.x || BIRD_X - br > col.x + COL_W) return false;
  return birdY - br < col.top || birdY + br > col.bottom;
}

// ── update ───────────────────────────────────────────────────
function update() {
  tick++;
  bobPhase  += 0.07;
  wingAngle += 0.18 * wingDir;
  if (wingAngle >  1.2) wingDir = -1;
  if (wingAngle < -1.2) wingDir =  1;

  if (state === 'PLAYING') {
    birdVY += GRAVITY;
    birdY  += birdVY;

    colTimer++;
    if (colTimer >= COL_INT) { spawnCol(); colTimer = 0; }

    cols = cols.filter(c => {
      c.x -= colSpeed;
      if (!c.scored && c.x + COL_W < BIRD_X) {
        c.scored = true;
        score++;
        if (score % 5 === 0) colSpeed = Math.min(colSpeed + 0.3, 5.5);
      }
      return c.x + COL_W > -10;
    });

    if (birdY + BIRD_R > H || birdY - BIRD_R < 0) { die(); return; }
    for (const c of cols) if (hits(c)) { die(); return; }

  } else {
    birdY  = H / 2 + Math.sin(bobPhase * 0.55) * 9;
    birdVY = 0;
  }

  parts = parts.filter(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.15;
    p.life -= 0.034;
    p.r    *= 0.97;
    return p.life > 0;
  });
}

// ── draw helpers ─────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  if (h <= 0) return;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── render ───────────────────────────────────────────────────
function drawBg() {
  // sky gradient (GradientPaint equivalent)
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, BG_TOP);
  sky.addColorStop(1, BG_BOT);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // moon halo
  ctx.fillStyle = 'rgba(245,230,200,0.1)';
  ctx.beginPath();
  ctx.arc(W - 56, 48, 40, 0, Math.PI * 2);
  ctx.fill();

  // moon body
  ctx.fillStyle = 'rgb(245,230,200)';
  ctx.beginPath();
  ctx.arc(W - 60, 48, 20, 0, Math.PI * 2);
  ctx.fill();

  // crescent cut
  ctx.fillStyle = 'rgb(42,32,64)';
  ctx.beginPath();
  ctx.arc(W - 53, 43, 19, 0, Math.PI * 2);
  ctx.fill();

  // stars
  for (let i = 0; i < SC; i++) {
    const a = 0.3 + 0.5 * Math.sin(tick * sspd[i] + sph[i]);
    ctx.fillStyle = `rgba(245,230,200,${a.toFixed(2)})`;
    ctx.beginPath();
    ctx.arc(sx[i], sy[i], Math.max(0.5, sr[i]), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCol(col) {
  const x = Math.round(col.x);
  const top = col.top, bot = col.bottom;

  // top pillar
  const gp = ctx.createLinearGradient(x, 0, x + COL_W, 0);
  gp.addColorStop(0, COL_DARK);
  gp.addColorStop(1, COL_MID);
  ctx.fillStyle = gp;
  if (top > 0) { roundRect(x, 0, COL_W, top, 8); ctx.fill(); }

  // top rim
  ctx.fillStyle = COL_RIM;
  roundRect(x - 5, top - 14, COL_W + 10, 16, 6);
  ctx.fill();

  // bottom pillar
  ctx.fillStyle = gp;
  const bh = H - bot;
  if (bh > 0) { roundRect(x, bot, COL_W, bh, 8); ctx.fill(); }

  // bottom rim
  ctx.fillStyle = COL_RIM;
  roundRect(x - 5, bot - 2, COL_W + 10, 16, 6);
  ctx.fill();
}

function drawBird() {
  const x = BIRD_X;
  const y = birdY + Math.sin(bobPhase) * 2.5;
  const r = BIRD_R;
  const tilt = Math.max(-0.5, Math.min(0.8, birdVY * 0.06));

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);

  // glow
  ctx.fillStyle = 'rgba(240,192,112,0.14)';
  ctx.beginPath();
  ctx.arc(0, 0, r * 2, 0, Math.PI * 2);
  ctx.fill();

  // wing
  const wOff = Math.sin(wingAngle) * 6;
  ctx.fillStyle = 'rgb(212,168,85)';
  ctx.beginPath();
  ctx.ellipse(-r - 2 + (r + 8) / 2, -r * 0.3 + wOff + (r / 2 + 4) / 2,
              (r + 8) / 2, (r / 2 + 4) / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // body gradient
  const bodyG = ctx.createRadialGradient(-r/3, -r/3, 1, 0, 0, r);
  bodyG.addColorStop(0, 'rgb(248,224,144)');
  bodyG.addColorStop(1, 'rgb(212,144,10)');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  // belly
  ctx.fillStyle = 'rgba(255,245,190,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, r * 0.3, r * 0.33, r * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // eye white
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(r * 0.35, -r * 0.25, r * 0.27, 0, Math.PI * 2);
  ctx.fill();

  // pupil
  ctx.fillStyle = 'rgb(30,27,46)';
  ctx.beginPath();
  ctx.arc(r * 0.42, -r * 0.18, r * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(r * 0.48, -r * 0.24, r * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // blush
  ctx.fillStyle = 'rgba(232,154,176,0.43)';
  ctx.beginPath();
  ctx.ellipse(r * 0.22, r * 0.2, r * 0.18, r * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // beak
  ctx.fillStyle = PINK;
  ctx.beginPath();
  ctx.moveTo(r * 0.5,  -r * 0.1);
  ctx.lineTo(r + 4,     r * 0.07);
  ctx.lineTo(r * 0.5,   r * 0.25);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticle(p) {
  ctx.globalAlpha = Math.max(0, p.life);
  ctx.fillStyle = `rgb(${p.cr},${p.cg},${p.cb})`;
  const rv = Math.max(1, p.r * p.life);
  ctx.beginPath();
  ctx.arc(p.x, p.y, rv, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawScore() {
  ctx.font = 'bold 34px serif';
  ctx.fillStyle = 'rgba(245,230,200,0.87)';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 55);
}

function drawOverlay() {
  // panel
  ctx.fillStyle = 'rgba(20,17,34,0.82)';
  roundRect(40, H/2 - 175, W - 80, 310, 24);
  ctx.fill();

  ctx.strokeStyle = 'rgba(164,143,200,0.27)';
  ctx.lineWidth = 1.5;
  roundRect(40, H/2 - 175, W - 80, 310, 24);
  ctx.stroke();
  ctx.lineWidth = 1;

  const title = state === 'IDLE'
    ? '~ lofi drift ~'
    : (score > 0 ? 'score: ' + score : 'oops~ try again');

  const sub = state === 'IDLE'
    ? 'click or SPACE to float up'
    : (score > 0 && score >= best ? '* new best! *' : 'you can do it!');

  // title
  ctx.font = 'bold 28px serif';
  ctx.fillStyle = LAVENDER;
  ctx.textAlign = 'center';
  ctx.fillText(title, W / 2, H/2 - 88);

  // subtitle
  ctx.font = '13px sans-serif';
  ctx.fillStyle = 'rgba(245,230,200,0.63)';
  ctx.fillText(sub, W / 2, H/2 - 55);

  // best
  if (best > 0) {
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = AMBER;
    ctx.fillText('best: ' + best, W / 2, H/2 - 25);
  }

  // button
  const bx = (W - 160) / 2, by = H/2 + 18, bw = 160, bh = 44;
  const btnG = ctx.createLinearGradient(bx, by, bx, by + bh);
  btnG.addColorStop(0, 'rgb(154,127,190)');
  btnG.addColorStop(1, 'rgb(106,79,158)');
  ctx.fillStyle = btnG;
  roundRect(bx, by, bw, bh, 22);
  ctx.fill();

  ctx.strokeStyle = 'rgba(164,143,200,0.39)';
  roundRect(bx, by, bw, bh, 22);
  ctx.stroke();

  ctx.font = 'bold 16px serif';
  ctx.fillStyle = 'rgb(20,17,34)';
  ctx.fillText(state === 'IDLE' ? 'Start' : 'Try Again', W / 2, by + 28);

  // hint
  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(200,180,230,0.35)';
  ctx.fillText('SPACE / CLICK / UP arrow to float', W / 2, H/2 + 100);
}

// ── main loop ────────────────────────────────────────────────
function loop() {
  update();
  drawBg();
  for (const c of cols)  drawCol(c);
  drawBird();
  for (const p of parts) drawParticle(p);
  if (state === 'PLAYING') drawScore();
  if (state !== 'PLAYING') drawOverlay();
  requestAnimationFrame(loop);
}

// ── events ───────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('mousedown', () => flap());
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

loop();
</script>
</body>
</html>
