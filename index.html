<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420, initial-scale=1.0">
<title>Lofi Drift</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#06041a; display:flex; justify-content:center; min-height:100vh; }
canvas { display:block; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

// ── roundRect polyfill ───────────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y); this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h); this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r); this.arcTo(x,y,x+r,y,r);
    this.closePath();
  };
}

// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CW=420, CH=746;
canvas.width=CW; canvas.height=CH;

// ── Constants ────────────────────────────────────────────────
const GRAVITY=0.34, FLAP_V=-7.5;
const COL_W=68, GAP=155, COL_INT=115;
const BIRD_S=58, BIRD_X=90;

// ── State ────────────────────────────────────────────────────
let state='IDLE', score=0, best=0;
let colSpeed=2.3, colTimer=0, tick=0;
let birdY=CH/2, birdVY=0, bobPhase=0;
let cols=[], parts=[];

// ── Game logic ───────────────────────────────────────────────
function flap(){
  if(state==='IDLE'||state==='DEAD'){ startGame(); return; }
  birdVY=FLAP_V;
}
function startGame(){
  score=0; colTimer=0; colSpeed=2.3;
  birdY=CH/2; birdVY=0; cols=[]; parts=[];
  state='PLAYING';
}
function die(){
  state='DEAD'; burst(BIRD_X,birdY);
  if(score>best) best=score;
}
function spawnCol(){
  const gc=140+Math.floor(Math.random()*(CH-320));
  cols.push({x:CW+COL_W,top:gc-GAP/2,bottom:gc+GAP/2,scored:false,v:Math.random()<0.5?1:2});
}
function burst(x,y){
  const pal=['#e89ab0','#b496e0','#7ec8b0','#f0c070'];
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*4+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,
                r:Math.random()*5+2,life:1,c:pal[~~(Math.random()*4)]});
  }
}
function hits(c){
  const br=BIRD_S/2-10;
  if(BIRD_X+br<c.x||BIRD_X-br>c.x+COL_W) return false;
  return birdY-br<c.top||birdY+br>c.bottom;
}

function update(){
  tick++; bobPhase+=0.065;
  if(state==='PLAYING'){
    birdVY+=GRAVITY; birdY+=birdVY;
    if(++colTimer>=COL_INT){ spawnCol(); colTimer=0; }
    cols=cols.filter(c=>{
      c.x-=colSpeed;
      if(!c.scored&&c.x+COL_W<BIRD_X){
        c.scored=true; score++;
        if(score%5===0) colSpeed=Math.min(colSpeed+0.28,5.5);
      }
      return c.x+COL_W>-10;
    });
    if(birdY+BIRD_S/2>CH||birdY-BIRD_S/2<0){ die(); return; }
    for(const c of cols) if(hits(c)){ die(); return; }
  } else {
    birdY=CH/2+Math.sin(bobPhase*0.5)*10; birdVY=0;
  }
  parts=parts.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14;
    p.life-=0.028; p.r*=0.97; return p.life>0;
  });
}

// ── Draw ─────────────────────────────────────────────────────
function drawCol(col,imgs){
  const x=Math.round(col.x);
  const ti=col.v===1?imgs.ct1:imgs.ct2;
  const bi=col.v===1?imgs.cb1:imgs.cb2;
  if(ti&&col.top>5)           ctx.drawImage(ti,x,0,COL_W,col.top);
  if(bi&&CH-col.bottom>5)     ctx.drawImage(bi,x,col.bottom,COL_W,CH-col.bottom);
}

function drawBird(img){
  const x=BIRD_X, y=birdY+Math.sin(bobPhase)*2.5;
  const tilt=Math.max(-0.45,Math.min(0.75,birdVY*0.055));
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  const glow=ctx.createRadialGradient(0,0,BIRD_S*0.2,0,0,BIRD_S);
  glow.addColorStop(0,'rgba(255,210,80,0.3)');
  glow.addColorStop(1,'rgba(255,210,80,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(0,0,BIRD_S,0,Math.PI*2); ctx.fill();
  if(img) ctx.drawImage(img,-BIRD_S/2,-BIRD_S/2,BIRD_S,BIRD_S);
  ctx.restore();
}

function drawParticles(){
  parts.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.shadowBlur=6; ctx.shadowColor=p.c;
    ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.8,p.r*p.life),0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function drawScorePill(){
  const pw=150,ph=40,px=(CW-pw)/2,py=112;
  ctx.shadowBlur=16; ctx.shadowColor='rgba(160,100,255,0.5)';
  const g=ctx.createLinearGradient(px,py,px,py+ph);
  g.addColorStop(0,'rgba(120,75,195,0.92)'); g.addColorStop(1,'rgba(80,48,160,0.92)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(px,py,pw,ph,ph/2); ctx.fill();
  ctx.strokeStyle='rgba(210,175,255,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,ph/2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(px+10,py+6,pw-20,ph*0.35,8); ctx.fill();
  ctx.shadowBlur=0;
  ctx.textBaseline='middle';
  ctx.font='13px serif'; ctx.fillStyle='rgb(240,192,112)';
  ctx.textAlign='left';  ctx.fillText('\u2605',px+12,py+ph/2);
  ctx.textAlign='right'; ctx.fillText('\u2605',px+pw-12,py+ph/2);
  ctx.font="bold 20px 'Fredoka One',serif";
  ctx.textAlign='center'; ctx.fillStyle='rgb(245,230,200)';
  ctx.shadowBlur=6; ctx.shadowColor='rgba(240,200,100,0.5)';
  ctx.fillText(score,CW/2,py+ph/2+1); ctx.shadowBlur=0;
}

function drawPlayScore(){
  ctx.font="bold 38px 'Fredoka One',serif";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowBlur=14; ctx.shadowColor='rgba(240,200,100,0.7)';
  ctx.fillStyle='rgba(245,230,200,0.95)';
  ctx.fillText(score,CW/2,52); ctx.shadowBlur=0;
}

function drawOverlay(){
  ctx.fillStyle='rgba(5,3,22,0.6)';
  ctx.beginPath(); ctx.roundRect(40,CH/2-95,CW-80,180,20); ctx.fill();
  ctx.strokeStyle='rgba(180,140,255,0.25)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(40,CH/2-95,CW-80,180,20); ctx.stroke();
  const title=state==='IDLE'?'~ lofi drift ~':(score>0?'score: '+score:'oops~');
  const sub  =state==='IDLE'?'tap to float!':(score>0&&score>=best?'\u2605 new best! \u2605':'you can do it!');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font="bold 26px 'Fredoka One',serif";
  ctx.shadowBlur=12; ctx.shadowColor='rgba(200,155,255,0.6)';
  ctx.fillStyle='rgb(210,180,252)';
  ctx.fillText(title,CW/2,CH/2-45); ctx.shadowBlur=0;
  ctx.font='14px sans-serif'; ctx.fillStyle='rgba(245,230,200,0.8)';
  ctx.fillText(sub,CW/2,CH/2-12);
  if(best>0&&state==='DEAD'){
    ctx.font='bold 13px sans-serif'; ctx.fillStyle='rgb(240,192,112)';
    ctx.fillText('best: '+best,CW/2,CH/2+18);
  }
}

function drawButton(){
  const bw=220,bh=62,bx=(CW-bw)/2,by=CH-148;
  ctx.shadowBlur=28; ctx.shadowColor='rgba(180,90,255,0.5)';
  const g=ctx.createLinearGradient(bx,by,bx,by+bh);
  g.addColorStop(0,'rgba(190,110,255,0.95)'); g.addColorStop(1,'rgba(120,65,205,0.95)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,bh/2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(225,195,255,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,bh/2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.roundRect(bx+14,by+8,bw-28,bh*0.36,16); ctx.fill();
  ctx.font="bold 28px 'Fredoka One',serif";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const btxt=state==='IDLE'?'Start':'Try Again';
  ctx.shadowBlur=8; ctx.shadowColor='rgba(60,20,120,0.8)';
  ctx.fillStyle='rgba(50,20,90,0.4)'; ctx.fillText(btxt,CW/2+1,by+bh/2+1);
  ctx.fillStyle='rgb(248,235,205)';   ctx.fillText(btxt,CW/2,by+bh/2);
  ctx.shadowBlur=0;
}

function drawHint(){
  ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(210,190,240,0.65)';
  ctx.fillText('\u2605 hint: tap to float, don\'t hit the columns \u2605',CW/2,CH-16);
}

// ── Load all images then start ───────────────────────────────
const imgSrcs = {
  bg:  'bg.jpg',
  bird:'bird.png',
  ct1: 'col_top1.png',
  cb1: 'col_bot1.png',
  ct2: 'col_top2.png',
  cb2: 'col_bot2.png'
};

const imgs = {};
let loadedCount = 0;
const totalImgs = Object.keys(imgSrcs).length;

// Draw loading screen while waiting
ctx.fillStyle='#06041a'; ctx.fillRect(0,0,CW,CH);
ctx.font="bold 22px 'Fredoka One',serif";
ctx.fillStyle='#a48fc8'; ctx.textAlign='center'; ctx.textBaseline='middle';
ctx.fillText('loading...', CW/2, CH/2);

function onImgLoaded(){
  loadedCount++;
  if(loadedCount === totalImgs){
    // all loaded — start game loop
    canvas.addEventListener('click',flap);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
    document.addEventListener('keydown',e=>{
      if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}
    });
    requestAnimationFrame(loop);
  }
}

Object.entries(imgSrcs).forEach(([key,src])=>{
  const img = new Image();
  img.onload  = ()=>{ imgs[key]=img; onImgLoaded(); };
  img.onerror = ()=>{ console.warn('Could not load:',src); imgs[key]=null; onImgLoaded(); };
  img.src = src;
});

function loop(){
  update();
  // background
  if(imgs.bg) ctx.drawImage(imgs.bg,0,0,CW,CH);
  else { ctx.fillStyle='#0a0630'; ctx.fillRect(0,0,CW,CH); }
  // columns
  cols.forEach(c=>drawCol(c,imgs));
  // bird
  drawBird(imgs.bird);
  // particles
  drawParticles();
  // UI
  if(state==='PLAYING') drawPlayScore();
  else { drawScorePill(); drawOverlay(); drawButton(); }
  drawHint();
  requestAnimationFrame(loop);
}

</script>
</body>
</html>
